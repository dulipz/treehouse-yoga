<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" preserveAspectRatio="none">
  <!-- Smooth watercolor / brush-paint edge.
       Lower baseFrequency = wider, softer strokes.
       feGaussianBlur on the result feathers the alpha so the edge
       fades out instead of being a hard wobbly outline. -->
  <defs>
    <filter id="paint" x="-15%" y="-18%" width="130%" height="136%">
      <feTurbulence type="fractalNoise" baseFrequency="0.0065" numOctaves="2" seed="3" />
      <feDisplacementMap in="SourceGraphic" scale="80" />
      <feGaussianBlur stdDeviation="3" />
    </filter>
  </defs>
  <rect x="80" y="60" width="840" height="580" fill="white" filter="url(#paint)" />
</svg>
